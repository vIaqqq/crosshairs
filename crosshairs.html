<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crosshair Repository</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #222222;
    --accent:   #ffffff;
    --muted:    #444444;
    --text:     #cccccc;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  header p {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-family: var(--mono);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: border-color 0.15s;
  }

  .card:hover {
    border-color: #444;
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-img img {
    width: 70%;
    height: 70%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .card-body {
    width: 100%;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--border);
  }

  .card-id {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .copy-btn {
    width: 100%;
    padding: 5px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }

  .copy-btn:hover {
    background: #1a1a1a;
    border-color: #555;
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: #3a3a3a;
    color: #888;
  }

  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 10px 20px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <h1>// Crosshair Repository</h1>
  <p>20 crosshairs — click to copy decal id</p>
</header>

<div class="grid" id="grid"></div>
<div id="toast"></div>

<script>
const crosshairs = [
  { id: 1,  decal: "970416013",       url: "./970416013%20.png" },
  { id: 2,  decal: "6929587871",      url: "./6929587871.png" },
  { id: 3,  decal: "2025732283",      url: "./2025732283.png" },
  { id: 4,  decal: "12230015092",     url: "./12230015092.png" },
  { id: 5,  decal: "4852860078",      url: "./4852860078.png" },
  { id: 6,  decal: "12511153427",     url: "./12511153427.png" },
  { id: 7,  decal: "6239892695",      url: "./6239892695.png" },
  { id: 8,  decal: "12572662746",     url: "./12572662746.png" },
  { id: 9,  decal: "7808856331",      url: "./7808856331.png" },
  { id: 10, decal: "4845399440",      url: "./4845399440.png" },
  { id: 11, decal: "5355104551",      url: "./5355104551%20(vlaq).png" },
  { id: 12, decal: "3045911268",      url: "./3045911268.png" },
  { id: 13, decal: "973821236",       url: "./973821236.png" },
  { id: 14, decal: "7512257281",      url: "./7512257281.png" },
  { id: 15, decal: "6737091192",      url: "./6737091192.png" },
  { id: 16, decal: "5317446797",      url: "./5317446797.png" },
  { id: 17, decal: "10717562048",     url: "./10717562048.png" },
  { id: 18, decal: "120148944180986", url: "./120148944180986.png" },
  { id: 19, decal: "5356562193",      url: "./5356562193.png" },
  { id: 20, decal: "11726322336",     url: "./11726322336.png" },
];

const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function copyDecal(decal, btn) {
  navigator.clipboard.writeText(decal).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    showToast(`copied: ${decal}`);
    setTimeout(() => {
      btn.textContent = 'copy id';
      btn.classList.remove('copied');
    }, 1500);
  });
}

crosshairs.forEach(ch => {
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="card-img">
      <img src="${ch.url}" alt="crosshair ${ch.id}" loading="lazy">
    </div>
    <div class="card-body">
      <span class="card-id">#${ch.id}</span>
      <button class="copy-btn">copy id</button>
    </div>
  `;

  card.querySelector('.copy-btn').addEventListener('click', function() {
    copyDecal(ch.decal, this);
  });

  grid.appendChild(card);
});
</script>
</body>
</html>
