<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crosshair Repository</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #222222;
    --accent:   #ffffff;
    --muted:    #444444;
    --text:     #cccccc;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  header p {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-family: var(--mono);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: border-color 0.15s;
  }

  .card:hover {
    border-color: #444;
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-img img {
    width: 70%;
    height: 70%;
    object-fit: contain;
    image-rendering: pixelated;
  }

  .card-body {
    width: 100%;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--border);
  }

  .card-id {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .copy-btn {
    width: 100%;
    padding: 5px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }

  .copy-btn:hover {
    background: #1a1a1a;
    border-color: #555;
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: #3a3a3a;
    color: #888;
  }

  /* toast */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    border: 1px solid #333;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 10px 20px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <h1>// Crosshair Repository</h1>
  <p>20 crosshairs — click to copy decal id</p>
</header>

<div class="grid" id="grid"></div>
<div id="toast"></div>

];

const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function copyDecal(decal, btn) {
  navigator.clipboard.writeText(decal).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    showToast(`copied: ${decal}`);
    setTimeout(() => {
      btn.textContent = 'copy id';
      btn.classList.remove('copied');
    }, 1500);
  });
}

crosshairs.forEach(ch => {
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <div class="card-img">
      <img src="${ch.url}" alt="crosshair ${ch.id}" loading="lazy">
    </div>
    <div class="card-body">
      <span class="card-id">#${ch.id}</span>
      <button class="copy-btn">copy id</button>
    </div>
  `;

  card.querySelector('.copy-btn').addEventListener('click', function() {
    copyDecal(ch.decal, this);
  });

  grid.appendChild(card);
});
</script>
</body>
</html>
